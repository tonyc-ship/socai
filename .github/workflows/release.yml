name: release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: semantic version bump for this release
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: prepare release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}
      base_sha: ${{ steps.base.outputs.base_sha }}

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: validate release ref
        shell: bash
        run: |
          set -euo pipefail

          case "${GITHUB_REF}" in
            refs/heads/main)
              echo "publishing release from main"
              ;;
            refs/heads/fix/release-*)
              echo "test release run from ${GITHUB_REF}; publish job will be skipped"
              ;;
            *)
              echo "releases must be dispatched from main or fix/release-*; current ref is ${GITHUB_REF}" >&2
              exit 1
              ;;
          esac

      - name: record release base commit
        id: base
        shell: bash
        run: |
          set -euo pipefail
          base_sha="$(git rev-parse HEAD)"
          echo "base_sha=${base_sha}"
          echo "base_sha=${base_sha}" >> "${GITHUB_OUTPUT}"

      - name: calculate next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(git tag --list 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"

          if [ -n "${latest_tag}" ]; then
            base_version="${latest_tag#v}"
            previous_tag="${latest_tag}"
          else
            base_version="$(python3 - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path('app/src-tauri/tauri.conf.json').read_text())['version'])
          PY
          )"
            previous_tag=""
          fi

          if [[ ! "${base_version}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "base version must be strict MAJOR.MINOR.PATCH semver, got: ${base_version}" >&2
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"

          case "${{ inputs.release_type }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "unsupported release type: ${{ inputs.release_type }}" >&2
              exit 1
              ;;
          esac

          version="${major}.${minor}.${patch}"
          tag="v${version}"

          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "tag ${tag} already exists" >&2
            exit 1
          fi

          echo "base_version=${base_version}"
          echo "previous_tag=${previous_tag}"
          echo "version=${version}"
          echo "tag=${tag}"

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "previous_tag=${previous_tag}" >> "${GITHUB_OUTPUT}"

  build:
    name: build ${{ matrix.label }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Use a current hosted macOS image for both targets; the Rust target
          # triple controls the artifact architecture.
          - label: apple silicon
            arch: apple-silicon
            target: aarch64-apple-darwin
            runner: macos-14
          - label: intel
            arch: intel
            target: x86_64-apple-darwin
            runner: macos-14

    steps:
      - name: checkout release base commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.base_sha }}

      - name: apply release version
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: python3 .github/scripts/set-app-version.py "${VERSION}"

      - name: set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
          run_install: false

      - name: set up node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: install frontend dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: set up rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: cache rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: ${{ matrix.target }}

      - name: clear stale bundle outputs
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          rm -rf "target/${TARGET}/release/bundle"

      - name: build app bundle and dmg
        working-directory: app
        run: |
          pnpm exec tauri build \
            --ci \
            --target "${{ matrix.target }}" \
            --bundles app,dmg \
            --config '{"bundle":{"macOS":{"signingIdentity":"-"}}}'

      - name: verify app bundle and dmg
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          bundle_dir="target/${TARGET}/release/bundle"
          app_bundle="${bundle_dir}/macos/socai.app"
          dmg_dir="${bundle_dir}/dmg"
          dmg="$(find "${dmg_dir}" -maxdepth 1 -type f -name '*.dmg' -print -quit)"

          if [ ! -d "${app_bundle}" ]; then
            echo "no app bundle found at ${app_bundle}" >&2
            exit 1
          fi

          if [ -z "${dmg}" ]; then
            echo "no dmg found in ${dmg_dir}" >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "${app_bundle}"
          hdiutil verify "${dmg}"

          mount_root="$(mktemp -d)"
          mount_point=""
          cleanup() {
            if [ -n "${mount_point}" ]; then
              hdiutil detach "${mount_point}" || true
            fi
            rm -rf "${mount_root}"
          }
          trap cleanup EXIT

          attach_output="$(hdiutil attach -nobrowse -readonly -mountroot "${mount_root}" "${dmg}")"
          echo "${attach_output}"
          mount_point="$(echo "${attach_output}" | awk 'END { print $NF }')"
          mounted_app="${mount_point}/socai.app"

          codesign --verify --deep --strict --verbose=2 "${mounted_app}"

          executable="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "${mounted_app}/Contents/Info.plist")"
          binary="${mounted_app}/Contents/MacOS/${executable}"
          actual_arch="$(lipo -archs "${binary}")"

          case "${TARGET}" in
            aarch64-apple-darwin)
              expected_arch="arm64"
              ;;
            x86_64-apple-darwin)
              expected_arch="x86_64"
              ;;
            *)
              echo "unsupported target for arch verification: ${TARGET}" >&2
              exit 1
              ;;
          esac

          if [ "${actual_arch}" != "${expected_arch}" ]; then
            echo "expected ${binary} to be ${expected_arch}, got: ${actual_arch}" >&2
            exit 1
          fi

      - name: collect distributable artifacts
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          ARCH: ${{ matrix.arch }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          bundle_dir="target/${TARGET}/release/bundle"
          dmg_dir="${bundle_dir}/dmg"
          mkdir -p dist-artifacts

          dmg="$(find "${dmg_dir}" -maxdepth 1 -type f -name '*.dmg' -print -quit)"

          if [ -z "${dmg}" ]; then
            echo "no dmg found in ${dmg_dir}" >&2
            exit 1
          fi

          cp "${dmg}" "dist-artifacts/socai-${VERSION}-macos-${ARCH}.dmg"

          ls -lah dist-artifacts

      - name: upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: socai-${{ needs.prepare.outputs.version }}-macos-${{ matrix.arch }}
          path: dist-artifacts/*
          if-no-files-found: error

  release:
    name: publish github release
    if: github.ref == 'refs/heads/main'
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest

    steps:
      - name: checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: socai-${{ needs.prepare.outputs.version }}-macos-*
          merge-multiple: true
          path: dist-artifacts

      - name: publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          PREVIOUS_TAG: ${{ needs.prepare.outputs.previous_tag }}
          BASE_SHA: ${{ needs.prepare.outputs.base_sha }}
        run: |
          set -euo pipefail

          current_main_sha="$(git rev-parse HEAD)"
          if [ "${current_main_sha}" != "${BASE_SHA}" ]; then
            echo "main moved while the release was building" >&2
            echo "expected ${BASE_SHA}, got ${current_main_sha}" >&2
            echo "rerun the release workflow from the latest main" >&2
            exit 1
          fi

          for arch in apple-silicon intel; do
            artifact="dist-artifacts/socai-${VERSION}-macos-${arch}.dmg"
            if [ ! -f "${artifact}" ]; then
              echo "missing release artifact: ${artifact}" >&2
              exit 1
            fi
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          python3 .github/scripts/set-app-version.py "${VERSION}"

          git add app/package.json app/src-tauri/tauri.conf.json app/src-tauri/Cargo.toml Cargo.lock
          if git diff --cached --quiet; then
            echo "version files already up to date"
          else
            git commit -m "chore: release socai v${VERSION}"
          fi

          release_sha="$(git rev-parse HEAD)"
          main_pushed=false
          remote_tag_pushed=false
          draft_release_created=false

          cleanup() {
            if [ "${main_pushed}" = "true" ]; then
              echo "main was already updated; leaving release state for manual inspection" >&2
              return
            fi

            if [ "${draft_release_created}" = "true" ]; then
              gh release delete "${TAG}" --repo "${GITHUB_REPOSITORY}" --cleanup-tag --yes || true
            elif [ "${remote_tag_pushed}" = "true" ]; then
              git push origin ":refs/tags/${TAG}" || true
            fi
          }
          trap cleanup ERR

          args=(-f "tag_name=${TAG}" -f "target_commitish=${BASE_SHA}")
          if [ -n "${PREVIOUS_TAG}" ]; then
            args+=(-f "previous_tag_name=${PREVIOUS_TAG}")
          fi

          gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" "${args[@]}" --jq '.body' > generated-notes.md

          cat > release-notes.md <<EOF
          ## downloads

          - [apple silicon mac dmg](https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/socai-${VERSION}-macos-apple-silicon.dmg)
          - [intel mac dmg](https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/socai-${VERSION}-macos-intel.dmg)

          These macOS builds are ad-hoc signed but not notarized. Gatekeeper may require right-clicking the app and choosing **Open** on first launch.

          ## changes

          EOF
          cat generated-notes.md >> release-notes.md

          git tag "${TAG}" "${release_sha}"
          git push origin "refs/tags/${TAG}"
          remote_tag_pushed=true

          gh release create "${TAG}" dist-artifacts/* \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --draft \
            --title "socai ${VERSION}" \
            --notes-file release-notes.md
          draft_release_created=true

          git push origin HEAD:main
          main_pushed=true

          gh release edit "${TAG}" --repo "${GITHUB_REPOSITORY}" --draft=false

          trap - ERR
          cat release-notes.md
